<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Belconnen Sold-History — Live</title>
<style>
:root{--navy:#1f3a5f;--blue:#2e75b6;--sky:#0ea5e9;--ink:#1e293b;--muted:#64748b;
--line:#e6ebf2;--soft:#f7f9fc;--chip:#eef4fb;--ok:#16a34a;--bg:#eef2f7;--gold:#c98a16;}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
a{color:var(--blue);text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px}
header{background:linear-gradient(120deg,#16304f,var(--navy) 45%,var(--blue) 90%,var(--sky) 130%);color:#fff;padding:26px 0 22px}
header .top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{margin:0;font-size:24px;font-weight:800}
header .sub{color:#cfe2f5;font-size:13.5px;margin-top:2px}
.live{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);
padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600}
.live .dot{width:9px;height:9px;border-radius:50%;background:#37d67a;box-shadow:0 0 0 0 rgba(55,214,122,.7);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(55,214,122,.6)}70%{box-shadow:0 0 0 8px rgba(55,214,122,0)}100%{box-shadow:0 0 0 0 rgba(55,214,122,0)}}
.controls{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin:18px 0;
display:flex;gap:10px;flex-wrap:wrap;align-items:center;box-shadow:0 3px 14px rgba(20,45,85,.05)}
.controls input,.controls select{font:inherit;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--soft);color:var(--ink)}
.controls input[type=search]{flex:1;min-width:200px}
.controls select{min-width:120px}
.controls .clear{margin-left:auto;background:var(--chip);border:1px solid var(--line);color:var(--navy);cursor:pointer;font-weight:600}
.meta-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin:4px 2px 12px;color:var(--muted);font-size:13.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;
box-shadow:0 3px 12px rgba(20,45,85,.05);transition:transform .12s,box-shadow .12s}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(20,45,85,.13)}
.media{position:relative;height:172px;background:linear-gradient(135deg,#dbe7f5,#eef4fb);display:flex;align-items:center;justify-content:center}
.media img{width:100%;height:100%;object-fit:cover;display:block}
.media .ph{color:#9db4cf;font-size:13px;font-weight:600}
.badge{position:absolute;top:10px;left:10px;background:var(--ok);color:#fff;font-size:11.5px;font-weight:700;
padding:4px 10px;border-radius:999px;letter-spacing:.3px;text-transform:uppercase}
.badge.auction{background:var(--gold)}.badge.other{background:#64748b}
.pcount{position:absolute;bottom:10px;right:10px;background:rgba(15,23,42,.72);color:#fff;font-size:11.5px;padding:3px 9px;border-radius:999px}
.body{padding:13px 14px}
.ptype{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.price{font-size:20px;font-weight:800;color:var(--navy);margin:2px 0 4px}
.addr{font-size:14px}.addr .street{font-weight:700;color:var(--ink)}
.specs{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.specs span{background:var(--chip);border:1px solid var(--line);border-radius:8px;padding:3px 9px;font-size:12.5px;color:var(--navy)}
.pager{display:flex;align-items:center;justify-content:center;gap:14px;margin:22px 0 40px}
.pager button{font:inherit;font-weight:600;padding:9px 16px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--navy);cursor:pointer}
.pager button:disabled{opacity:.45;cursor:not-allowed}
.state{text-align:center;color:var(--muted);padding:50px 16px;font-size:15px}
.state.err{color:#b3261e}
.state button{margin-top:12px;font:inherit;font-weight:600;padding:8px 16px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--navy);cursor:pointer}
.skl{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.skl .m{height:172px;background:linear-gradient(90deg,#eef2f7,#e3e9f2,#eef2f7);background-size:200% 100%;animation:sh 1.2s infinite}
.skl .b{padding:13px 14px}.skl .l{height:12px;border-radius:6px;background:#eef2f7;margin:7px 0}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* modal */
.backdrop{position:fixed;inset:0;background:rgba(15,23,42,.62);display:none;align-items:flex-start;justify-content:center;overflow:auto;z-index:40}
.backdrop.open{display:flex}
.sheet{background:#fff;max-width:820px;width:94%;margin:30px 0;border-radius:16px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.hero{position:relative;background:linear-gradient(120deg,var(--navy),var(--blue));color:#fff;padding:20px 22px}
.hero h2{margin:0;font-size:20px}.hero .loc{color:#cfe2f5;font-size:13.5px;margin-top:3px}
.hero .pr{font-size:24px;font-weight:800;margin-top:8px}
.x{position:absolute;top:14px;right:14px;width:34px;height:34px;border:none;border-radius:50%;background:rgba(255,255,255,.18);color:#fff;font-size:18px;cursor:pointer}
.gallery{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;background:var(--soft)}
.gallery img{height:120px;border-radius:8px;border:1px solid var(--line);cursor:zoom-in;flex:none}
.mbody{padding:8px 22px 22px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin:14px 0}
.cell{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:9px 11px}
.cell .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.cell .v{font-weight:700;color:var(--navy);font-size:15px}
.sect{margin:16px 0 6px;color:var(--navy);font-weight:800;font-size:15px;border-bottom:2px solid var(--chip);padding-bottom:4px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chips span{background:var(--chip);border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:13px;color:var(--navy)}
.kv{font-size:14px;margin:3px 0}.kv b{color:var(--navy)}
.desc{white-space:pre-wrap;font-size:14px;color:#334155}
.ext{display:inline-block;margin-top:14px;background:var(--blue);color:#fff;padding:9px 16px;border-radius:9px;font-weight:600}
footer{text-align:center;color:var(--muted);font-size:12.5px;padding:20px 0 40px}
</style>
</head>
<body>
<header><div class="wrap">
  <div class="top">
    <div><h1>Belconnen Sold-History</h1><div class="sub">Live property data &middot; updated continuously</div></div>
    <div class="live"><span class="dot"></span> Live</div>
  </div>
</div></header>

<div class="wrap">
  <div class="controls">
    <input type="search" id="q" placeholder="Search address, street or suburb…" autocomplete="off">
    <select id="f-suburb"><option value="all">All suburbs</option></select>
    <select id="f-status"><option value="all">All status</option></select>
    <select id="f-type"><option value="all">All types</option></select>
    <select id="f-beds"><option value="all">Any beds</option></select>
    <select id="sort">
      <option value="suburb_asc">Suburb A–Z</option>
      <option value="suburb_desc">Suburb Z–A</option>
      <option value="sold_new">Sold date (newest)</option>
      <option value="sold_old">Sold date (oldest)</option>
      <option value="updated">Recently updated</option>
    </select>
    <button class="clear" id="clear" type="button">Clear</button>
  </div>

  <div class="meta-row"><div id="count">Loading…</div><div id="pageinfo"></div></div>
  <div id="results"></div>
  <div class="pager" id="pager" style="display:none">
    <button id="prev" type="button">&larr; Prev</button>
    <span id="pagelabel"></span>
    <button id="next" type="button">Next &rarr;</button>
  </div>
</div>

<div class="backdrop" id="modal" role="dialog" aria-modal="true"><div class="sheet" id="sheet"></div></div>
<footer>Belconnen Sold-History &middot; live from Supabase</footer>

<script>
"use strict";
(function(){
  // ---------- tiny safe helpers ----------
  var $ = function(s){ return document.querySelector(s); };
  function esc(v){
    return String(v==null?"":v).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }
  // display value: hide null / "N/A" / spurious "0"
  function G(v){ var s = (v==null?"":String(v)).trim(); return (s===""||s==="N/A")?"":s; }
  function num(v){ var s=G(v); return (s===""||s==="0")?"":s; }
  function splitList(v){
    var s=G(v); if(!s) return [];
    return s.split(/\s*\|\s*|\s*;\s*/).map(function(x){return x.trim();})
            .filter(function(x){return x && x!=="N/A";});
  }
  function firstImage(v){ var a=String(v||"").split(/\s*;\s*/).filter(Boolean); return a[0]||""; }
  function statusClass(s){ s=(s||"").toLowerCase(); if(s.indexOf("auction")>=0) return "auction"; if(s.indexOf("sold")>=0) return ""; return "other"; }

  // ---------- state ----------
  var state = { q:"", suburb:"all", status:"all", type:"all", beds:"all", sort:"suburb_asc", page:1, pageSize:50, total:null, hasMore:false };
  var inflight = null; // AbortController for the list request

  // ---------- API ----------
  function api(path){
    return fetch(path, { headers:{ "Accept":"application/json" } }).then(function(r){
      if(!r.ok) return r.json().catch(function(){return {};}).then(function(j){ throw new Error(j.error || ("HTTP "+r.status)); });
      return r.json();
    });
  }
  function qs(obj){
    return Object.keys(obj).filter(function(k){ return obj[k]!=null && obj[k]!=="" && obj[k]!=="all"; })
      .map(function(k){ return encodeURIComponent(k)+"="+encodeURIComponent(obj[k]); }).join("&");
  }

  // ---------- rendering ----------
  function skeletons(){
    var h=""; for(var i=0;i<8;i++){ h+='<div class="skl"><div class="m"></div><div class="b"><div class="l" style="width:40%"></div><div class="l" style="width:80%"></div><div class="l" style="width:60%"></div></div></div>'; }
    $("#results").className="grid"; $("#results").innerHTML=h;
  }
  function cardHTML(r){
    var img=firstImage(r.image_urls);
    var media = img
      ? '<img src="'+esc(img)+'" loading="lazy" alt="" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\';"><span class="ph" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center">No image</span>'
      : '<span class="ph">'+esc(G(r.property_type)||"Property")+'</span>';
    var st=G(r.status);
    var badge = st ? '<span class="badge '+statusClass(st)+'">'+esc(st)+'</span>' : '';
    var pc = num(r.image_count) ? '<span class="pcount">'+esc(r.image_count)+' photos</span>' : '';
    var specs="";
    if(num(r.bedrooms))  specs+='<span>&#128716; '+esc(r.bedrooms)+'</span>';
    if(num(r.bathrooms)) specs+='<span>&#128705; '+esc(r.bathrooms)+'</span>';
    if(num(r.parking))   specs+='<span>&#128663; '+esc(r.parking)+'</span>';
    if(num(r.eer))       specs+='<span>EER '+esc(r.eer)+'</span>';
    var street=G(r.street)||G(r.address)||"";
    var locline=[G(r.suburb),G(r.postcode)].filter(Boolean).join(" ");
    return '<div class="card" data-id="'+esc(r.id)+'">'
      + '<div class="media">'+media+badge+pc+'</div>'
      + '<div class="body">'
      + '<div class="ptype">'+esc(G(r.property_type)||"&nbsp;")+'</div>'
      + '<div class="price">'+esc(G(r.price_sold_price)||"Price N/A")+'</div>'
      + '<div class="addr"><span class="street">'+esc(street)+'</span>'+(locline?(' &middot; '+esc(locline)):'')+'</div>'
      + (specs?('<div class="specs">'+specs+'</div>'):'')
      + '</div></div>';
  }
  function renderList(data){
    var rows=data.rows||[];
    if(rows.length===0){
      $("#results").className=""; $("#results").innerHTML='<div class="state">No properties match your search.</div>';
      $("#pager").style.display="none"; return;
    }
    $("#results").className="grid";
    $("#results").innerHTML=rows.map(cardHTML).join("");
    Array.prototype.forEach.call(document.querySelectorAll(".card"), function(c){
      c.addEventListener("click", function(){ openModal(c.getAttribute("data-id")); });
    });
    // pager
    $("#pager").style.display="flex";
    $("#prev").disabled = state.page<=1;
    $("#next").disabled = !data.hasMore;
    var totalPages = (state.total!=null) ? Math.max(1, Math.ceil(state.total/state.pageSize)) : null;
    $("#pagelabel").textContent = "Page "+state.page+(totalPages?(" of "+totalPages):"");
  }
  function renderCount(){
    if(state.total!=null){ $("#count").textContent = state.total.toLocaleString()+" properties"; }
    else { $("#count").textContent = ""; }
  }

  // ---------- load list ----------
  function load(){
    if(inflight) inflight.abort();
    inflight = new AbortController();
    var sig = inflight.signal;
    skeletons();
    $("#count").textContent="Loading…"; $("#pageinfo").textContent="";
    var query = qs({ q:state.q, suburb:state.suburb, status:state.status, type:state.type, beds:state.beds, sort:state.sort, page:state.page, pageSize:state.pageSize });
    fetch("/api/listings?"+query, { signal:sig, headers:{Accept:"application/json"} })
      .then(function(r){ if(!r.ok) return r.json().catch(function(){return{};}).then(function(j){throw new Error(j.error||("HTTP "+r.status));}); return r.json(); })
      .then(function(data){
        state.total=data.total; state.hasMore=data.hasMore;
        renderCount(); renderList(data);
      })
      .catch(function(e){
        if(e.name==="AbortError") return; // superseded by a newer request
        $("#results").className="";
        $("#results").innerHTML='<div class="state err">Could not load data.<br><small>'+esc(e.message||"")+'</small><br><button id="retry" type="button">Retry</button></div>';
        $("#pager").style.display="none"; $("#count").textContent="";
        var rb=$("#retry"); if(rb) rb.addEventListener("click", load);
      });
  }

  // ---------- modal ----------
  function openModal(id){
    if(!id) return;
    var modal=$("#modal"), sheet=$("#sheet");
    sheet.innerHTML='<div class="hero"><button class="x" id="mx" type="button">&times;</button><h2>Loading…</h2></div>';
    modal.classList.add("open"); document.body.style.overflow="hidden";
    $("#mx").addEventListener("click", closeModal);
    api("/api/listing?id="+encodeURIComponent(id))
      .then(function(r){ sheet.innerHTML=detailHTML(r); var x=$("#mx"); if(x) x.addEventListener("click",closeModal); })
      .catch(function(e){
        sheet.innerHTML='<div class="hero"><button class="x" id="mx" type="button">&times;</button><h2>Could not load</h2><div class="loc">'+esc(e.message||"")+'</div></div>';
        var x=$("#mx"); if(x) x.addEventListener("click",closeModal);
      });
  }
  function closeModal(){ $("#modal").classList.remove("open"); document.body.style.overflow=""; $("#sheet").innerHTML=""; }

  function specCell(k,v){ var s=num(v); return s? '<div class="cell"><div class="k">'+esc(k)+'</div><div class="v">'+esc(s)+'</div></div>':''; }
  function section(title, inner){ return inner? '<div class="sect">'+esc(title)+'</div>'+inner : ''; }
  function chips(title, arr){ if(!arr.length) return ""; return section(title,'<div class="chips">'+arr.map(function(x){return '<span>'+esc(x)+'</span>';}).join("")+'</div>'); }
  function kv(label,v){ var s=G(v); return s? '<div class="kv"><b>'+esc(label)+':</b> '+esc(s)+'</div>':''; }

  function detailHTML(r){
    var imgs=String(r.image_urls||"").split(/\s*;\s*/).filter(Boolean);
    var gallery = imgs.length? '<div class="gallery">'+imgs.map(function(u){return '<img src="'+esc(u)+'" loading="lazy" alt="" onerror="this.remove()">';}).join("")+'</div>':'';
    var loc=[G(r.suburb),G(r.state),G(r.postcode)].filter(Boolean).join(" ");
    var st=G(r.status);
    var specs = specCell("Beds",r.bedrooms)+specCell("Baths",r.bathrooms)+specCell("Parking",r.parking)
              + specCell("EER",r.eer)+specCell("Land/Building",r.building_size)
              + (G(r.property_type)?'<div class="cell"><div class="k">Type</div><div class="v">'+esc(r.property_type)+'</div></div>':'');
    var agentInner="";
    [["Agent",r.agent_name],["Agent phone",r.agent_phone],["Agency",r.agency],["Agency phone",r.agency_phone]].forEach(function(p){ agentInner+=kv(p[0],p[1]); });
    var detailsInner="";
    [["Listing ID",r.listing_id],["Sold date",r.sold_date],["Listed date",r.listed_date],["Last updated",r.last_updated],["Page views",r.viewed_page_views],["Locality",r.source_locality],["Source",r.source_type]].forEach(function(p){ detailsInner+=kv(p[0],p[1]); });

    var ext = G(r.listing_url)? '<a class="ext" href="'+esc(r.listing_url)+'" target="_blank" rel="noopener noreferrer">View on allhomes &#8599;</a>':'';

    return '<div class="hero"><button class="x" id="mx" type="button">&times;</button>'
      + '<h2>'+esc(G(r.address)||"Property")+'</h2>'
      + (loc?'<div class="loc">'+esc(loc)+'</div>':'')
      + (st?'<div class="loc" style="margin-top:6px"><span class="badge '+statusClass(st)+'" style="position:static">'+esc(st)+'</span></div>':'')
      + '<div class="pr">'+esc(G(r.price_sold_price)||"Price N/A")+'</div></div>'
      + gallery
      + '<div class="mbody">'
      + (specs?('<div class="sgrid">'+specs+'</div>'):'')
      + chips("Features", splitList(r.features))
      + chips("Key details", splitList(r.key_details))
      + chips("Block / other", splitList(r.other_block_details))
      + chips("What's nearby", splitList(r.whats_nearby))
      + chips("Property history", splitList(r.property_history))
      + section("Description", G(r.description)?('<div class="desc">'+esc(r.description)+'</div>'):'')
      + section("Agent &amp; agency", agentInner)
      + section("Listing details", detailsInner)
      + ext
      + '</div>';
  }

  // ---------- facets ----------
  function fillSelect(sel, values, allLabel){
    var cur=sel.value;
    var h='<option value="all">'+allLabel+'</option>';
    values.forEach(function(v){ h+='<option value="'+esc(v)+'">'+esc(v)+'</option>'; });
    sel.innerHTML=h;
    if(cur && values.indexOf(cur)>=0) sel.value=cur;
  }
  function loadFacets(){
    api("/api/facets").then(function(f){
      fillSelect($("#f-suburb"), f.suburbs||[], "All suburbs");
      fillSelect($("#f-status"), f.statuses||[], "All status");
      fillSelect($("#f-type"),   f.types||[],   "All types");
      fillSelect($("#f-beds"),   f.beds||[],    "Any beds");
    }).catch(function(){ /* dropdowns just stay as "All" — search still works */ });
  }

  // ---------- events ----------
  var debTimer=null;
  function debounce(fn,ms){ return function(){ clearTimeout(debTimer); debTimer=setTimeout(fn,ms); }; }
  function resetAndLoad(){ state.page=1; load(); }

  $("#q").addEventListener("input", debounce(function(){ state.q=$("#q").value.trim(); resetAndLoad(); },300));
  $("#f-suburb").addEventListener("change", function(){ state.suburb=this.value; resetAndLoad(); });
  $("#f-status").addEventListener("change", function(){ state.status=this.value; resetAndLoad(); });
  $("#f-type").addEventListener("change", function(){ state.type=this.value; resetAndLoad(); });
  $("#f-beds").addEventListener("change", function(){ state.beds=this.value; resetAndLoad(); });
  $("#sort").addEventListener("change", function(){ state.sort=this.value; resetAndLoad(); });
  $("#clear").addEventListener("click", function(){
    state={q:"",suburb:"all",status:"all",type:"all",beds:"all",sort:"suburb_asc",page:1,pageSize:50,total:state.total,hasMore:false};
    $("#q").value=""; $("#f-suburb").value="all"; $("#f-status").value="all"; $("#f-type").value="all"; $("#f-beds").value="all"; $("#sort").value="suburb_asc";
    load();
  });
  $("#prev").addEventListener("click", function(){ if(state.page>1){ state.page--; load(); window.scrollTo(0,0);} });
  $("#next").addEventListener("click", function(){ if(state.hasMore){ state.page++; load(); window.scrollTo(0,0);} });
  $("#modal").addEventListener("click", function(e){ if(e.target.id==="modal") closeModal(); });
  document.addEventListener("keydown", function(e){ if(e.key==="Escape" && $("#modal").classList.contains("open")) closeModal(); });

  // ---------- go ----------
  loadFacets();
  load();
})();
</script>
</body>
</html>
